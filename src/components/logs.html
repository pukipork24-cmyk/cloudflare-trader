<!-- Logs Panel Component -->
<div class="logs-container">
  <!-- Filters Section (Sticky) -->
  <div class="logs-filters">
    <div class="filter-row">
      <div class="filter-group">
        <label>Level</label>
        <div class="chip-group">
          <button class="chip active" data-filter="level" data-value="all">All</button>
          <button class="chip" data-filter="level" data-value="SUCCESS">✓ Success</button>
          <button class="chip" data-filter="level" data-value="INFO">ℹ Info</button>
          <button class="chip" data-filter="level" data-value="WARN">⚠ Warn</button>
          <button class="chip" data-filter="level" data-value="ERROR">✕ Error</button>
        </div>
      </div>
      <div class="filter-group">
        <label>Agent</label>
        <select id="agent-filter" class="filter-select">
          <option value="">All Agents</option>
          <option value="technical">Technical</option>
          <option value="sentiment">Sentiment</option>
          <option value="fundamental">Fundamental</option>
          <option value="risk">Risk</option>
          <option value="portfolio">Portfolio</option>
          <option value="intelligence">Intelligence</option>
          <option value="execution">Execution (CIO)</option>
        </select>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-group">
        <label>Event Type</label>
        <select id="event-filter" class="filter-select">
          <option value="">All Events</option>
          <option value="AGENT_CALL">Agent Call</option>
          <option value="TRADE">Trade Execution</option>
          <option value="ORDER">Order Update</option>
          <option value="API_ERROR">API Error</option>
          <option value="APPROVAL">CIO Approval</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Date Range</label>
        <select id="date-filter" class="filter-select">
          <option value="1h">Last 1 hour</option>
          <option value="24h" selected>Last 24 hours</option>
          <option value="7d">Last 7 days</option>
          <option value="custom">Custom</option>
        </select>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-group full">
        <label>Search</label>
        <input type="text" id="log-search" placeholder="Search logs..." class="search-input">
      </div>
    </div>

    <div class="filter-actions">
      <button class="btn btn-secondary" onclick="applyLogFilters()">Apply Filters</button>
      <button class="btn btn-secondary" onclick="resetLogFilters()">Reset</button>
    </div>
  </div>

  <!-- Log Controls -->
  <div class="log-controls">
    <div class="control-left">
      <label class="toggle-label">
        <input type="checkbox" id="auto-scroll" class="toggle-input" checked>
        <span class="toggle-switch-small"></span>
        <span>Auto-scroll</span>
      </label>
      <span class="log-stats" id="log-stats">456 logs | 12 errors | Last 24h</span>
    </div>
    <div class="control-right">
      <button class="btn btn-secondary btn-sm" onclick="pauseLogs()">⏸ Pause</button>
      <button class="btn btn-secondary btn-sm" onclick="exportLogs('json')">⬇ JSON</button>
      <button class="btn btn-secondary btn-sm" onclick="exportLogs('csv')">⬇ CSV</button>
      <button class="btn btn-danger btn-sm" onclick="clearLogs()">🗑 Clear</button>
    </div>
  </div>

  <!-- Live Log Stream -->
  <div class="log-stream" id="log-stream">
    <!-- Logs populated here by JavaScript -->
    <div class="log-entry loading">
      <span>Loading logs...</span>
    </div>
  </div>
</div>
